name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-quality:
    name: Build & Quality Check
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: BUILD — setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: TEST — check JS syntax if files exist
      - name: Check JavaScript syntax
        run: |
          echo "Checking JavaScript files..."
          for f in *.js; do
            [ -f "$f" ] && node --check "$f" && echo "✅ $f OK"
          done
          echo "✅ JavaScript check complete"