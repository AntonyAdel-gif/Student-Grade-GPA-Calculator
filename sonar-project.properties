# ── SonarQube Project Configuration ──────────────────
sonar.projectKey=gpa-calculator
sonar.projectName=Student Grade & GPA Calculator
sonar.projectVersion=1.0

# ── Source files ──────────────────────────────────────
sonar.sources=.

# ── File inclusions (only scan our JS files) ──────────
sonar.inclusions=**/*.js,**/*.html,**/*.css

# ── File exclusions (ignore unrelated files) ──────────
sonar.exclusions=**/*.min.js,**/node_modules/**
